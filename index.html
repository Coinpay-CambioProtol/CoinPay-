<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinPay - Cambio Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .terminal {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        h2 {
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }
        label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background-color: #2b2b2b;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #008c23;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff00;
            color: #000;
        }
        #status {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            word-wrap: break-word;
        }
        .btn-connect {
            background-color: #f6851b;
            color: #fff;
        }
        .btn-connect:hover {
            background-color: #e2761b;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="terminal">
    <h2>[ CoinPay | Cambio Protocol ]</h2>
    
    <button id="btnConnect" class="btn-connect">Conectar MetaMask</button>
    <div id="walletAddress" style="text-align: center; margin-top: 5px; font-size: 12px;"></div>

    <label for="lojista">Endereço do Lojista (Recebedor):</label>
    <input type="text" id="lojista" placeholder="0x..." required>

    <label for="moeda">Moeda de Pagamento:</label>
    <select id="moeda">
        <option value="MATIC">MATIC (Taxa 3%)</option>
        <option value="CAMBIO">CAMBIO Token (Taxa 1%)</option>
    </select>

    <label for="valor">Valor:</label>
    <input type="number" id="valor" placeholder="Ex: 1.5" step="any" required>

    <button id="btnPagar">Processar Pagamento</button>

    <div id="status">Aguardando conexão...</div>
</div>

<script>
    // Endereços dos Contratos oficiais da Cambio Protocol na Polygon
    const routerAddress = "0x718fb84737d74a9e4acb6ea507423d3d2742b39d";
    const cambioTokenAddress = "0xeFf80c7A04CAF0142007856803Ae923E193835F7";

    // ABIs mínimos necessários para as funções
    const routerAbi = [
        "function pagarNativoDynamic(address payable destinoLojista) external payable",
        "function pagarComTokenDynamic(address tokenAddress, uint256 amount, address destinoLojista) external"
    ];
    
    const erc20Abi = [
        "function approve(address spender, uint256 amount) external returns (bool)",
        "function allowance(address owner, address spender) external view returns (uint256)"
    ];

    let provider;
    let signer;

    const btnConnect = document.getElementById('btnConnect');
    const btnPagar = document.getElementById('btnPagar');
    const statusDiv = document.getElementById('status');
    const walletDiv = document.getElementById('walletAddress');

    // Função para conectar a carteira
    btnConnect.addEventListener('click', async () => {
        if (window.ethereum) {
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                walletDiv.innerText = "Carteira: " + address.substring(0, 6) + "..." + address.substring(38);
                btnConnect.style.display = 'none';
                statusDiv.innerText = "Conectado. Pronto para operar.";
                statusDiv.style.color = "#00ff00";
            } catch (error) {
                statusDiv.innerText = "Erro ao conectar: " + error.message;
                statusDiv.style.color = "red";
            }
        } else {
            statusDiv.innerText = "MetaMask não encontrada no navegador!";
            statusDiv.style.color = "red";
        }
    });

    // Função para processar o pagamento
    btnPagar.addEventListener('click', async () => {
        if (!signer) {
            alert("Conecte a carteira primeiro!");
            return;
        }

        const lojista = document.getElementById('lojista').value;
        const moeda = document.getElementById('moeda').value;
        const valorInput = document.getElementById('valor').value;

        if (!ethers.utils.isAddress(lojista) || !valorInput || valorInput <= 0) {
            statusDiv.innerText = "Erro: Verifique o endereço do lojista e o valor.";
            statusDiv.style.color = "red";
            return;
        }

        try {
            const valorEmWei = ethers.utils.parseUnits(valorInput, 18);
            const routerContract = new ethers.Contract(routerAddress, routerAbi, signer);

            if (moeda === "MATIC") {
                statusDiv.innerText = "Aguardando confirmação de MATIC...";
                statusDiv.style.color = "yellow";
                
                const tx = await routerContract.pagarNativoDynamic(lojista, { value: valorEmWei });
                statusDiv.innerText = "Transação enviada! Aguardando blockchain...";
                await tx.wait();
                
                statusDiv.innerText = "Pagamento em MATIC concluído com sucesso! (Taxa de 3% cobrada)";
                statusDiv.style.color = "#00ff00";

            } else if (moeda === "CAMBIO") {
                const tokenContract = new ethers.Contract(cambioTokenAddress, erc20Abi, signer);
                
                statusDiv.innerText = "Passo 1/2: Aprove o gasto do Token CAMBIO...";
                statusDiv.style.color = "yellow";
                
                const txApprove = await tokenContract.approve(routerAddress, valorEmWei);
                await txApprove.wait();

                statusDiv.innerText = "Passo 2/2: Confirmando pagamento no Roteador...";
                const txPay = await routerContract.pagarComTokenDynamic(cambioTokenAddress, valorEmWei, lojista);
                await txPay.wait();

                statusDiv.innerText = "Pagamento em CAMBIO concluído com sucesso! (Taxa de 1% cobrada)";
                statusDiv.style.color = "#00ff00";
            }
        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Erro na transação. Verifique o console.";
            statusDiv.style.color = "red";
        }
    });
</script>

</body>
</html>
