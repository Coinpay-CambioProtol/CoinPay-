<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COINPAY GLOBAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #02040a; --neon: #00ff88; --panel: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: monospace; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; }
        .btn-pay { background: var(--neon); color: #000; font-weight: bold; width: 100%; padding: 16px; border-radius: 8px; }
        .btn-secondary { background: #21262d; border: 1px solid #30363d; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-size: 0.875rem; }
        #qrcode img { margin: 0 auto; background: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen justify-center">

    <section id="config-container" class="w-full max-w-sm glass p-6 hidden text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
            <span class="text-xl">⚙️</span>
            <h2 class="text-sm font-bold tracking-wider text-green-400">CONFIGURAÇÃO DO TERMINAL</h2>
        </div>
        <p class="text-xs text-gray-400 mb-6">Insira o endereço da carteira EVM (colhedora) que receberá os pagamentos automáticos neste dispositivo.</p>
        
        <div class="mb-6 text-left">
            <label class="text-[10px] uppercase text-gray-500 font-bold block mb-2">Endereço da Carteira (Destino)</label>
            <input type="text" id="input-wallet" placeholder="0x..." 
                   class="w-full bg-black border border-gray-700 p-3 rounded text-xs text-white focus:outline-none focus:border-green-400 text-center font-mono tracking-tight">
        </div>

        <button class="btn-pay mb-3 shadow-lg shadow-green-900/20" onclick="App.salvarCarteiraLojista()">
            SALVAR E ATIVAR TERMINAL
        </button>
        
        <button id="btn-cancelar-config" class="text-xs text-gray-500 hover:text-white underline hidden" onclick="App.voltarAoTerminal()">
            Cancelar e Voltar
        </button>
    </section>

    <main id="terminal-container" class="w-full max-w-sm glass p-6 hidden">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <button onclick="App.abrirConfiguracao()" class="text-gray-400 hover:text-white text-xl transition-transform hover:rotate-45 duration-200">⚙️</button>
                <h1 class="text-sm font-bold tracking-wide">COINPAY <span style="color:var(--neon)">TERMINAL</span></h1>
            </div>
            <select id="moeda" onchange="App.update()" class="bg-black border border-gray-700 text-xs p-1 rounded text-white focus:outline-none">
                <option value="USDT">USDT</option>
                <option value="USDC">USDC</option>
                <option value="BRL">BRL (R$)</option>
            </select>
        </header>

        <div id="visor" class="text-right text-4xl mb-6 text-green-400 font-bold tracking-tight">USDT 0,00</div>
        
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="App.numpad(1)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">1</button>
            <button onclick="App.numpad(2)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">2</button>
            <button onclick="App.numpad(3)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">3</button>
            <button onclick="App.numpad(4)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">4</button>
            <button onclick="App.numpad(5)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">5</button>
            <button onclick="App.numpad(6)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">6</button>
            <button onclick="App.numpad(7)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">7</button>
            <button onclick="App.numpad(8)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">8</button>
            <button onclick="App.numpad(9)" class="p-4 bg-gray-900 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">9</button>
            <button onclick="App.clear()" class="p-4 bg-red-950 text-red-400 hover:bg-red-900 rounded text-xl font-bold transition-colors">C</button>
            <button onclick="App.numpad(0)" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">0</button>
            <button onclick="App.backspace()" class="p-4 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 rounded text-xl transition-colors">⌫</button>
        </div>
        
        <button class="btn-pay mb-2 shadow-lg shadow-green-900/10" onclick="App.process()">PAGAR AGORA (WEB3)</button>
        <button class="btn-secondary transition-colors hover:bg-gray-800" onclick="App.gerarCobranca()">GERAR COBRANÇA À DISTÂNCIA</button>
    </main>

    <section id="checkout-container" class="w-full max-w-sm glass p-6 hidden text-center">
        <h2 class="text-sm font-bold mb-2 tracking-wider">ESCANEIE PARA PAGAR</h2>
        <div id="cobranca-valores" class="text-2xl text-green-400 font-bold mb-4">0,00</div>
        
        <div id="qrcode" class="flex justify-center mb-6"></div>
        
        <div class="space-y-2">
            <button onclick="App.compartilhar('whatsapp')" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded font-bold text-sm flex items-center justify-center gap-2 transition-colors">
                Compartilhar no WhatsApp
            </button>
            <button onclick="App.compartilhar('telegram')" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded font-bold text-sm flex items-center justify-center gap-2 transition-colors">
                Compartilhar no Telegram
            </button>
            <button onclick="App.copiarLink()" class="btn-secondary transition-colors hover:bg-gray-800">Copiar Link de Pagamento</button>
            <button onclick="App.voltarAoTerminal()" class="text-xs text-gray-400 underline pt-2 block mx-auto">Voltar ao Terminal</button>
        </div>
    </section>

    <script>
        // Endereço fixo do contrato Router que processará as liquidações
        const CONTRACT_ADDRESS = "0x79ce1969be43f738a6d05c89e2bd73d39b009b1c";
        
        // Estrutura ABI para envio do comando transferFrom
        const CONTRACT_ABI = [
            {
                "inputs": [
                    { "internalType": "address", "name": "sender", "type": "address" },
                    { "internalType": "address", "name": "recipient", "type": "address" },
                    { "internalType": "uint256", "name": "amount", "type": "uint256" }
                ],
                "name": "transferFrom",
                "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        let qrcodeInstance = null;

        const App = {
            valor: 0,
            walletDestino: "",
            
            init: () => {
                // Tenta puxar a carteira previamente salva no armazenamento interno do navegador
                App.walletDestino = localStorage.getItem("coinpay_merchant_wallet") || "";

                const urlParams = new URLSearchParams(window.location.search);
                const val = urlParams.get('v');
                const m = urlParams.get('m');
                
                if (m) document.getElementById('moeda').value = m;
                if (val) {
                    App.valor = Math.round(parseFloat(val) * 100);
                    App.update();
                    
                    // Se o link foi aberto como uma cobrança enviada para o cliente, exibe o terminal e chama a MetaMask
                    document.getElementById('terminal-container').classList.remove('hidden');
                    setTimeout(() => { App.process(); }, 600);
                } else {
                    // Se for o painel de operação limpo e não possuir carteira salva, abre a Tela de Configuração
                    if (!App.walletDestino) {
                        document.getElementById('config-container').classList.remove('hidden');
                    } else {
                        document.getElementById('terminal-container').classList.remove('hidden');
                        App.update();
                    }
                }
            },

            salvarCarteiraLojista: () => {
                const wallet = document.getElementById('input-wallet').value.trim();
                
                // Validador estrutural de segurança para carteiras EVM válidas
                if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) {
                    return alert("Por favor, insira um endereço de carteira válido (deve começar com 0x e possuir 42 caracteres hexadecimais).");
                }

                // Persiste o endereço na memória local do dispositivo
                localStorage.setItem("coinpay_merchant_wallet", wallet);
                App.walletDestino = wallet;

                // Transiciona a interface para o modo terminal funcional
                document.getElementById('config-container').classList.add('hidden');
                document.getElementById('terminal-container').classList.remove('hidden');
                App.clear();
            },

            abrirConfiguracao: () => {
                document.getElementById('input-wallet').value = App.walletDestino;
                
                // Exibe o botão cancelar se o lojista já tiver uma configuração válida ativa
                if (App.walletDestino) {
                    document.getElementById('btn-cancelar-config').classList.remove('hidden');
                }
                
                document.getElementById('terminal-container').classList.add('hidden');
                document.getElementById('checkout-container').classList.add('hidden');
                document.getElementById('config-container').classList.remove('hidden');
            },

            voltarAoTerminal: () => {
                document.getElementById('config-container').classList.add('hidden');
                document.getElementById('checkout-container').classList.add('hidden');
                document.getElementById('terminal-container').classList.remove('hidden');
                App.update();
            },

            numpad: (n) => { App.valor = (App.valor * 10) + n; App.update(); },
            clear: () => { App.valor = 0; App.update(); },
            backspace: () => { App.valor = Math.floor(App.valor / 10); App.update(); },
            
            update: () => { 
                const moeda = document.getElementById('moeda').value;
                document.getElementById('visor').innerText = `${moeda} ${(App.valor/100).toFixed(2)}`; 
            },

            gerarLinkPagamento: () => {
                const valorFinal = (App.valor / 100).toString();
                const moeda = document.getElementById('moeda').value;
                const urlBase = window.location.href.split('?')[0];
                return `${urlBase}?v=${valorFinal}&m=${moeda}`;
            },

            gerarCobranca: () => {
                if(App.valor === 0) return alert("Digite um valor para gerar cobrança.");
                
                const moeda = document.getElementById('moeda').value;
                const valorExibicao = `${moeda} ${(App.valor/100).toFixed(2)}`;
                document.getElementById('cobranca-valores').innerText = valorExibicao;

                const linkPagamento = App.gerarLinkPagamento();
                document.getElementById('qrcode').innerHTML = "";

                qrcodeInstance = new QRCode(document.getElementById("qrcode"), {
                    text: linkPagamento,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                document.getElementById('terminal-container').classList.add('hidden');
                document.getElementById('checkout-container').classList.remove('hidden');
            },

            compartilhar: (plataforma) => {
                const link = encodeURIComponent(App.gerarLinkPagamento());
                const moeda = document.getElementById('moeda').value;
                const valorExibicao = `${moeda} ${(App.valor/100).toFixed(2)}`;
                const texto = encodeURIComponent(`Olá! Segue o link para efetuar o pagamento de ${valorExibicao} no terminal:\n\n`);
                
                let urlCompartilhar = "";
                if(plataforma === 'whatsapp') urlCompartilhar = `https://api.whatsapp.com/send?text=${texto}${link}`;
                else if(plataforma === 'telegram') urlCompartilhar = `https://t.me/share/url?url=${link}&text=${texto}`;

                window.open(urlCompartilhar, '_blank');
            },

            copiarLink: () => {
                navigator.clipboard.writeText(App.gerarLinkPagamento()).then(() => {
                    alert("Link de pagamento copiado!");
                });
            },

            process: async () => {
                if(App.valor === 0) return alert("Por favor, introduza um valor no visor.");
                
                // Garante a leitura da carteira salva no dispositivo para executar o repasse
                const destinoFinal = App.walletDestino || localStorage.getItem("coinpay_merchant_wallet");
                if(!destinoFinal) return alert("Erro de Configuração: Nenhuma carteira de destino configurada.");
                
                const valorFinal = (App.valor / 100).toString();
                const moedaSelecionada = document.getElementById('moeda').value;

                if (!window.ethereum) {
                    const urlSemProtocolo = window.location.href.split('?')[0].replace(/^https?:\/\//, '');
                    window.location.href = `https://metamask.app.link/dapp/${urlSemProtocolo}?v=${valorFinal}&m=${moedaSelecionada}`;
                    return;
                }

                try {
                    const contas = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const carteiraCliente = contas[0];

                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const signer = await provider.getSigner();
                    const contrato = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                    
                    const tokenDecimals = 6; 
                    const valorFormatado = ethers.parseUnits(valorFinal, tokenDecimals);

                    alert("Conexão Web3 ativa. Confirme os dados e assine o pagamento na sua carteira.");

                    // Envia a transação injetando a carteira que o lojista configurou na interface
                    const tx = await contrato.transferFrom(carteiraCliente, destinoFinal, valorFormatado);
                    
                    alert(`Transação transmitida com sucesso!\nHash: ${tx.hash}`);
                    await tx.wait();
                    alert("Sucesso! O pagamento foi liquidado.");
                    
                    App.clear();
                    App.voltarAoTerminal();
                } catch (error) {
                    console.error(error);
                    alert("Falha no processamento: " + (error.reason || error.message));
                }
            }
        };

        window.onload = App.init;
    </script>
</body>
</html>
