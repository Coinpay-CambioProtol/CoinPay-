<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COINPAY | GATEWAY SYSTEM PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --panel: #10141d; --accent: #00ff88; --text: #ffffff; --danger: #ff4d4d; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; }
        
        /* UI Components */
        .card { background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--border); color: #fff; }
        
        #display { font-size: 3rem; font-weight: 800; text-align: right; color: var(--accent); }
        .history-list { max-height: 200px; overflow-y: auto; font-size: 14px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(5,7,10,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="font-weight:800; font-size:1.2rem;">COINPAY</div>
        <button id="wallet-btn" onclick="Gateway.connect()" class="btn-secondary" style="padding:8px 15px; width:auto;">Conectar Wallet</button>
    </div>

    <div class="card">
        <div id="display">R$ 0,00</div>
    </div>

    <div class="card" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
        <button class="btn btn-secondary" onclick="Gateway.add('1')">1</button>
        <button class="btn btn-secondary" onclick="Gateway.add('2')">2</button>
        <button class="btn btn-secondary" onclick="Gateway.add('3')">3</button>
        <button class="btn btn-secondary" onclick="Gateway.add('4')">4</button>
        <button class="btn btn-secondary" onclick="Gateway.add('5')">5</button>
        <button class="btn btn-secondary" onclick="Gateway.add('6')">6</button>
        <button class="btn btn-secondary" onclick="Gateway.add('7')">7</button>
        <button class="btn btn-secondary" onclick="Gateway.add('8')">8</button>
        <button class="btn btn-secondary" onclick="Gateway.add('9')">9</button>
        <button class="btn btn-secondary" onclick="Gateway.add('C')">C</button>
        <button class="btn btn-secondary" onclick="Gateway.add('0')">0</button>
        <button class="btn btn-secondary" onclick="Gateway.add('DEL')"><i class="fas fa-backspace"></i></button>
    </div>

    <button class="btn btn-primary" onclick="Gateway.checkout()">GERAR COBRANÇA</button>
    <button class="btn btn-secondary" onclick="Gateway.toggleHistory()">VER HISTÓRICO</button>

    <div id="history-view" class="card" style="display:none;">
        <h3>Vendas Recentes</h3>
        <button class="btn" onclick="Gateway.exportCSV()">Exportar CSV</button>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<div id="modal">
    <div id="qr-box" style="background:white; padding:20px; border-radius:20px;"></div>
    <button class="btn" style="width:200px; margin-top:20px;" onclick="document.getElementById('modal').style.display='none'">FECHAR</button>
</div>

<script type="module">
    import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers6@4.1.2';
    
    const projectId = '2953526137ff76e4771c57b62ba3979a';
    const modal = createWeb3Modal({
        ethersConfig: defaultConfig({ metadata: { name: 'Coinpay', url: window.location.origin } }),
        chains: [{ chainId: 56, name: 'BNB', currency: 'BNB', rpcUrl: 'https://bsc-dataseed.binance.org/' }],
        projectId
    });

    window.Gateway = {
        val: "",
        transactions: JSON.parse(localStorage.getItem('txs') || '[]'),
        
        connect: () => modal.open(),
        add: (n) => {
            if(n === 'C') Gateway.val = ""; 
            else if(n === 'DEL') Gateway.val = Gateway.val.slice(0, -1);
            else if(Gateway.val.length < 8) Gateway.val += n;
            document.getElementById('display').innerText = (parseFloat(Gateway.val||0)/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        },
        checkout: () => {
            if(!Gateway.val) return alert("Insira um valor.");
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('qr-box').innerHTML = "";
            new QRCode(document.getElementById('qr-box'), "VALOR_BNB_" + Gateway.val);
            Gateway.saveTx(Gateway.val);
        },
        saveTx: (val) => {
            Gateway.transactions.unshift({ date: new Date().toLocaleTimeString(), val: (val/100).toFixed(2) });
            localStorage.setItem('txs', JSON.stringify(Gateway.transactions));
            Gateway.renderHistory();
        },
        renderHistory: () => {
            document.getElementById('history-list').innerHTML = Gateway.transactions.map(t => 
                `<div class="history-item"><span>${t.date}</span><span style="color:var(--accent)">R$ ${t.val}</span></div>`
            ).join('');
        },
        toggleHistory: () => {
            const v = document.getElementById('history-view');
            v.style.display = v.style.display === 'none' ? 'block' : 'none';
        },
        exportCSV: () => {
            const csv = "Data,Valor\n" + Gateway.transactions.map(t => `${t.date},${t.val}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'historico.csv'; a.click();
        }
    };
    Gateway.renderHistory();
</script>
</body>
</html>
