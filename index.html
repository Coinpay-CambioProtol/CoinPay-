<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COINPAY GLOBAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #02040a; --neon: #00ff88; --panel: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: monospace; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; }
        .btn-pay { background: var(--neon); color: #000; font-weight: bold; width: 100%; padding: 16px; border-radius: 8px; }
        .btn-secondary { background: #21262d; border: 1px solid #30363d; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-size: 0.875rem; }
        #qrcode img { margin: 0 auto; background: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen justify-center">

    <section id="config-container" class="w-full max-w-sm glass p-6 hidden text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
            <span class="text-xl">⚙️</span>
            <h2 class="text-sm font-bold tracking-wider text-green-400">CONFIGURAÇÃO DO TERMINAL</h2>
        </div>
        <p class="text-xs text-gray-400 mb-6">Insira a carteira que receberá os pagamentos automáticos neste dispositivo (Rede Polygon).</p>
        <div class="mb-6 text-left">
            <label class="text-[10px] uppercase text-gray-500 font-bold block mb-2">Sua Carteira de Recebimento</label>
            <input type="text" id="input-wallet" placeholder="0x..." class="w-full bg-black border border-gray-700 p-3 rounded text-xs text-white focus:outline-none focus:border-green-400 text-center font-mono">
        </div>
        <button class="btn-pay mb-3" onclick="App.salvarCarteiraLojista()">ATIVAR TERMINAL</button>
    </section>

    <main id="terminal-container" class="w-full max-w-sm glass p-6 hidden">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <button onclick="App.abrirConfiguracao()" class="text-gray-400 hover:text-white text-xl">⚙️</button>
                <h1 class="text-sm font-bold tracking-wide">COINPAY <span style="color:var(--neon)">TERMINAL</span></h1>
            </div>
            <select id="moeda" onchange="App.update()" class="bg-black border border-gray-700 text-xs p-1 rounded text-white focus:outline-none">
                <option value="USDT">USDT (Polygon)</option>
                <option value="POL">POL / MATIC (Polygon)</option>
            </select>
        </header>

        <div id="visor" class="text-right text-4xl mb-6 text-green-400 font-bold tracking-tight">$ 0,00</div>
        
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="App.numpad(1)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">1</button>
            <button onclick="App.numpad(2)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">2</button>
            <button onclick="App.numpad(3)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">3</button>
            <button onclick="App.numpad(4)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">4</button>
            <button onclick="App.numpad(5)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">5</button>
            <button onclick="App.numpad(6)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">6</button>
            <button onclick="App.numpad(7)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">7</button>
            <button onclick="App.numpad(8)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">8</button>
            <button onclick="App.numpad(9)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">9</button>
            <button onclick="App.clear()" class="p-4 bg-red-950 text-red-400 hover:bg-red-900 rounded text-xl font-bold">C</button>
            <button onclick="App.numpad(0)" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">0</button>
            <button onclick="App.backspace()" class="p-4 bg-gray-800 hover:bg-gray-700 rounded text-xl">⌫</button>
        </div>
        
        <button class="btn-pay" onclick="App.gerarCobranca()">GERAR COBRANÇA (QR CODE)</button>
    </main>

    <section id="checkout-container" class="w-full max-w-sm glass p-6 hidden text-center">
        <h2 class="text-sm font-bold mb-2 tracking-wider">ESCANEIE PARA PAGAR</h2>
        <div id="cobranca-valores" class="text-2xl text-green-400 font-bold mb-4">$ 0,00</div>
        
        <div id="qrcode" class="flex justify-center mb-6"></div>
        
        <div class="space-y-2">
            <button onclick="App.compartilhar('whatsapp')" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded font-bold text-sm">Compartilhar no WhatsApp</button>
            <button onclick="App.compartilhar('telegram')" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded font-bold text-sm">Compartilhar no Telegram</button>
            <button onclick="App.copiarLink()" class="btn-secondary">Copiar Link Direto</button>
            <button onclick="App.voltarAoTerminal()" class="text-xs text-gray-400 underline pt-2 block mx-auto">Voltar ao Terminal</button>
        </div>
    </section>

    <section id="payer-container" class="w-full max-w-sm glass p-6 hidden text-center animate-pulse">
        <h2 class="text-xs tracking-widest text-gray-400 uppercase mb-2">COINPAY GATEWAY</h2>
        <div class="text-sm font-bold mb-4">PROCESSANDO PAGAMENTO</div>
        <div id="payer-val" class="text-3xl text-green-400 font-bold mb-2">$ 0,00</div>
        <p class="text-[11px] text-gray-500 font-mono mb-6 break-all" id="payer-dest"></p>
        <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-green-400 border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]"></div>
        <p class="text-xs text-gray-400 mt-4">Confirme a transação na janela flutuante da sua carteira...</p>
    </section>

    <script>
        // Endereço oficial do USDT na Polygon Mainnet
        const USDT_CONTRACT_ADDRESS = "0xc2132d05d31c914a87c6611c10748aeb04b58e8f"; 

        // Interface simplificada para transferência de Tokens ERC-20
        const ERC20_ABI = [
            {
                "inputs": [
                    { "internalType": "address", "name": "to", "type": "address" },
                    { "internalType": "uint256", "name": "value", "type": "uint256" }
                ],
                "name": "transfer",
                "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        let qrcodeInstance = null;

        const App = {
            valor: 0,
            walletDestino: "",
            moedaSelecionada: "USDT",
            
            init: () => {
                const urlParams = new URLSearchParams(window.location.search);
                const val = urlParams.get('v');
                const m = urlParams.get('m') || 'USDT';
                const dest = urlParams.get('dest');

                // Rota executada no smartphone do CLIENTE
                if (dest && val) {
                    App.walletDestino = dest;
                    App.moedaSelecionada = m;
                    App.valor = Math.round(parseFloat(val) * 100);
                    
                    document.getElementById('payer-val').innerText = `$ ${parseFloat(val).toFixed(2)} (${m})`;
                    document.getElementById('payer-dest').innerText = `Para: ${dest}`;
                    document.getElementById('payer-container').classList.remove('hidden');
                    
                    setTimeout(() => { App.executarPagamentoCliente(val, m); }, 1200);
                    return;
                }

                // Rota executada no terminal do LOJISTA
                App.walletDestino = localStorage.getItem("coinpay_merchant_wallet") || "";
                if (!App.walletDestino) {
                    document.getElementById('config-container').classList.remove('hidden');
                } else {
                    document.getElementById('terminal-container').classList.remove('hidden');
                    App.update();
                }
            },

            salvarCarteiraLojista: () => {
                const wallet = document.getElementById('input-wallet').value.trim();
                if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) {
                    return alert("Insira uma carteira EVM válida (0x...)");
                }
                localStorage.setItem("coinpay_merchant_wallet", wallet);
                App.walletDestino = wallet;
                document.getElementById('config-container').classList.add('hidden');
                document.getElementById('terminal-container').classList.remove('hidden');
                App.clear();
            },

            abrirConfiguracao: () => {
                document.getElementById('input-wallet').value = App.walletDestino;
                document.getElementById('terminal-container').classList.add('hidden');
                document.getElementById('config-container').classList.remove('hidden');
            },

            numpad: (n) => { App.valor = (App.valor * 10) + n; App.update(); },
            clear: () => { App.valor = 0; App.update(); },
            backspace: () => { App.valor = Math.floor(App.valor / 10); App.update(); },
            
            update: () => { 
                const moedaElement = document.getElementById('moeda');
                if (moedaElement) App.moedaSelecionada = moedaElement.value;
                document.getElementById('visor').innerText = `$ ${(App.valor/100).toFixed(2)}`; 
            },

            gerarLinkPagamento: () => {
                const valorFinal = (App.valor / 100).toString();
                const urlLimpa = window.location.href.split('?')[0].replace(/^https?:\/\//, '');
                return `https://metamask.app.link/dapp/${urlLimpa}?v=${valorFinal}&m=${App.moedaSelecionada}&dest=${App.walletDestino}`;
            },

            gerarCobranca: () => {
                if(App.valor === 0) return alert("Digite um valor.");
                
                document.getElementById('cobranca-valores').innerText = `$ ${(App.valor/100).toFixed(2)} (${App.moedaSelecionada})`;

                const linkMetaMaskDireto = App.gerarLinkPagamento();
                document.getElementById('qrcode').innerHTML = "";

                qrcodeInstance = new QRCode(document.getElementById("qrcode"), {
                    text: linkMetaMaskDireto,
                    width: 210,
                    height: 210,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                document.getElementById('terminal-container').classList.add('hidden');
                document.getElementById('checkout-container').classList.remove('hidden');
            },

            compartilhar: (plataforma) => {
                const link = encodeURIComponent(App.gerarLinkPagamento());
                const texto = encodeURIComponent(`Olá! Utilize o link abaixo para realizar o pagamento de $ ${(App.valor/100).toFixed(2)} em ${App.moedaSelecionada} na rede Polygon:\n\n`);
                
                let url = plataforma === 'whatsapp' 
                    ? `https://api.whatsapp.com/send?text=${texto}${link}`
                    : `https://t.me/share/url?url=${link}&text=${texto}`;
                window.open(url, '_blank');
            },

            copiarLink: () => {
                navigator.clipboard.writeText(App.gerarLinkPagamento()).then(() => alert("Link de pagamento copiado!"));
            },

            voltarAoTerminal: () => {
                document.getElementById('checkout-container').classList.add('hidden');
                document.getElementById('config-container').classList.add('hidden');
                document.getElementById('terminal-container').classList.remove('hidden');
                App.update();
            },

            executarPagamentoCliente: async (valor, moeda) => {
                if (!window.ethereum) {
                    alert("Abra este link dentro do navegador integrado da sua Carteira Web3 (MetaMask/Rabby).");
                    return;
                }

                try {
                    // Garante que a carteira do cliente está apontada para a rede Polygon Mainnet (ID 137)
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x89' }], 
                        });
                    } catch (switchError) {
                        if (switchError.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x89',
                                    chainName: 'Polygon Mainnet',
                                    nativeCurrency: { name: 'POL', symbol: 'POL', decimals: 18 },
                                    rpcUrls: ['https://polygon-rpc.com/'],
                                    blockExplorerUrls: ['https://polygonscan.com/']
                                }]
                            });
                        } else {
                            throw switchError;
                        }
                    }

                    const contas = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const signer = await provider.getSigner();
                    
                    let tx;

                    // Verifica se o pagamento é na Moeda Nativa (POL/MATIC) ou via Smart Contract (USDT)
                    if (moeda === "POL" || moeda === "MATIC") {
                        const valorFormatado = ethers.parseEther(valor);
                        tx = await signer.sendTransaction({
                            to: App.walletDestino,
                            value: valorFormatado
                        });
                    } else {
                        const contrato = new ethers.Contract(USDT_CONTRACT_ADDRESS, ERC20_ABI, signer);
                        const tokenDecimals = 6; 
                        const valorFormatado = ethers.parseUnits(valor, tokenDecimals);
                        tx = await contrato.transfer(App.walletDestino, valorFormatado);
                    }
                    
                    alert(`Transação enviada para a rede!\nHash: ${tx.hash}`);
                    await tx.wait();
                    
                    document.getElementById('payer-container').classList.remove('animate-pulse');
                    document.getElementById('payer-container').innerHTML = `
                        <span class="text-4xl text-green-400">✅</span>
                        <h2 class="text-lg font-bold mt-2 text-green-400">PAGAMENTO CONCLUÍDO</h2>
                        <p class="text-xs text-gray-400 mt-1">O saldo em ${moeda} foi liquidado na carteira do lojista.</p>
                    `;
                } catch (error) {
                    console.error(error);
                    alert("Erro no pagamento: " + (error.reason || error.message));
                }
            }
        };

        window.onload = App.init;
    </script>
</body>
</html>
