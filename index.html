<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COINPAY GLOBAL TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #02040a; --neon: #00ff88; --panel: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: monospace; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; }
        .btn-pay { background: var(--neon); color: #000; font-weight: bold; width: 100%; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-sm flex justify-between items-center mb-6">
        <h1 class="text-sm font-bold">COINPAY <span style="color:var(--neon)">TERMINAL</span></h1>
        <select id="moeda" onchange="App.update()" class="bg-black border border-gray-700 text-xs p-1">
            <option value="USDT">USDT</option>
            <option value="USDC">USDC</option>
            <option value="BRL">BRL (R$)</option>
        </select>
    </header>

    <main class="w-full max-w-sm glass p-6">
        <div id="visor" class="text-right text-4xl mb-6 text-green-400">0,00</div>
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="App.numpad(1)" class="p-4 bg-gray-800 rounded">1</button>
            <button onclick="App.numpad(2)" class="p-4 bg-gray-800 rounded">2</button>
            <button onclick="App.numpad(3)" class="p-4 bg-gray-800 rounded">3</button>
            <button onclick="App.numpad(4)" class="p-4 bg-gray-800 rounded">4</button>
            <button onclick="App.numpad(5)" class="p-4 bg-gray-800 rounded">5</button>
            <button onclick="App.numpad(6)" class="p-4 bg-gray-800 rounded">6</button>
            <button onclick="App.numpad(7)" class="p-4 bg-gray-800 rounded">7</button>
            <button onclick="App.numpad(8)" class="p-4 bg-gray-800 rounded">8</button>
            <button onclick="App.numpad(9)" class="p-4 bg-gray-900 rounded">9</button>
            <button onclick="App.clear()" class="p-4 bg-red-900 rounded">C</button>
            <button onclick="App.numpad(0)" class="p-4 bg-gray-800 rounded">0</button>
            <button onclick="App.backspace()" class="p-4 bg-gray-800 rounded">⌫</button>
        </div>
        <button class="btn-pay" onclick="App.process()">PROCESSAR OPERAÇÃO</button>
    </main>

    <script>
        // 1. ENDEREÇO DO CONTRATO INTELIGENTE INFORMADO
        const CONTRACT_ADDRESS = "0x79ce1969be43f738a6d05c89e2bd73d39b009b1c";
        
        // 2. CONFIGURAÇÃO OBRIGATÓRIA: Insira a carteira que vai RECEBER os fundos nesta variável
        const WALLET_DESTINO = "INSIRA_AQUI_A_SUA_CARTEIRA_DE_DESTINO";

        // ABI fornecida integrada ao sistema de chamadas
        const CONTRACT_ABI = [
            {
                "inputs": [
                    { "internalType": "address", "name": "sender", "type": "address" },
                    { "internalType": "address", "name": "recipient", "type": "address" },
                    { "internalType": "uint256", "name": "amount", "type": "uint256" }
                ],
                "name": "transferFrom",
                "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        const App = {
            valor: 0,
            
            init: () => {
                // Tenta recuperar parâmetros da URL (útil para links externos e redirecionamentos de apps móveis)
                const urlParams = new URLSearchParams(window.location.search);
                const val = urlParams.get('v');
                const m = urlParams.get('m');
                
                if (m) document.getElementById('moeda').value = m;
                if (val) App.valor = Math.round(parseFloat(val) * 100);
                App.update();
            },

            numpad: (n) => { App.valor = (App.valor * 10) + n; App.update(); },
            clear: () => { App.valor = 0; App.update(); },
            backspace: () => { App.valor = Math.floor(App.valor / 10); App.update(); },
            
            update: () => { 
                const moeda = document.getElementById('moeda').value;
                document.getElementById('visor').innerText = `${moeda} ${(App.valor/100).toFixed(2)}`; 
            },

            process: async () => {
                // Validações básicas de segurança na interface
                if(App.valor === 0) return alert("Por favor, introduza um valor no terminal.");
                if(WALLET_DESTINO.startsWith("INSIRA_AQUI")) return alert("Erro de Configuração: Defina a WALLET_DESTINO no código do script.");
                
                const valorFinal = (App.valor / 100).toString();
                const moedaSelecionada = document.getElementById('moeda').value;

                // Verificação de ambiente Web3 (Redirecionamento para Mobile se não houver carteira injetada)
                if (!window.ethereum) {
                    const urlSemProtocolo = window.location.href.split('?')[0].replace(/^https?:\/\//, '');
                    window.location.href = `https://metamask.app.link/dapp/${urlSemProtocolo}?v=${valorFinal}&m=${moedaSelecionada}`;
                    return;
                }

                try {
                    // Inicializa a conexão com o provedor Web3 injetado (ex: MetaMask)
                    const contas = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const carteiraCliente = contas[0]; // Captura o endereço de quem está pagando (sender)

                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const signer = await provider.getSigner();
                    
                    // Instancia o contrato utilizando o endereço e a ABI configurados
                    const contrato = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                    
                    // Configuração de Decimais: 
                    // Stablecoins como USDT e USDC usam frequentemente 6 decimais nas redes principais (BSC/Polygon/Arbitrum). 
                    // Caso o seu token customizado utilize 18 decimais, mude este valor para 18.
                    const tokenDecimals = 6; 
                    const valorFormatado = ethers.parseUnits(valorFinal, tokenDecimals);

                    alert("Ligação estabelecida! Por favor, assine a transação na sua carteira...");

                    // Executa a chamada do método transferFrom
                    const tx = await contrato.transferFrom(carteiraCliente, WALLET_DESTINO, valorFormatado);
                    
                    alert(`Transação enviada com sucesso! Acompanhe o processamento através do hash:\n${tx.hash}`);
                    
                    // Aguarda a mineração do bloco na rede blockchain
                    await tx.wait();
                    alert("Pagamento confirmado e liquidado com sucesso na rede!");
                    
                    App.clear();
                } catch (error) {
                    console.error(error);
                    alert("A operação falhou: " + (error.reason || error.message || "Erro desconhecido na rede."));
                }
            }
        };

        // Executa a inicialização assim que a janela carregar por completo
        window.onload = App.init;
    </script>
</body>
</html>
