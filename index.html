<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COINPAY | TERMINAL PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variáveis de Design - Tema Escuro por Defeito / Suporte a Tema Claro */
        :root {
            --bg-base: #010208;
            --bg-panel: #0b0e14;
            --primary: #00ff88;
            --danger: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #1f293d;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-base: #f0f2f5;
            --bg-panel: #ffffff;
            --primary: #00cc6a;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            transition: var(--transition); 
            user-select: none;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .app-container { 
            width: 100%; 
            max-width: 440px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-panel); 
            border-left: 1px solid var(--border); 
            border-right: 1px solid var(--border); 
            position: relative; 
        }
        
        #splash-screen { 
            position: absolute; 
            inset: 0; 
            background: var(--bg-base); 
            z-index: 999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: opacity 0.5s ease;
        }
        .spinner { 
            border: 4px solid var(--border); 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { 
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg-panel);
        }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .brand-logo { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
        .brand { font-weight: 900; letter-spacing: 0.5px; font-size: 16px; color: var(--text-main); text-transform: uppercase; }
        .brand span { color: var(--primary); }
        
        .visor { 
            background: var(--bg-base); 
            margin: 20px; 
            padding: 25px 20px; 
            border-radius: 14px; 
            text-align: right; 
            border: 1px solid var(--border); 
        }
        .amount { 
            font-size: 38px; 
            font-weight: 700; 
            font-family: 'Courier New', monospace; 
            letter-spacing: -1px; 
            color: var(--text-main);
        }
        .amount-usd { 
            font-size: 13px; 
            color: var(--text-muted); 
            margin-top: 6px; 
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; }
        .key { background: var(--bg-base); border: 1px solid var(--border); color: var(--text-main); padding: 18px; border-radius: 12px; font-size: 22px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .key:active { background: var(--primary); color: #000; transform: scale(0.95); }
        .key.action { font-size: 18px; color: var(--danger); }
        
        .btn-main { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 15px; margin: 20px; cursor: pointer; transition: var(--transition); text-transform: uppercase; box-shadow: 0 4px 12px rgba(0, 255, 136, 0.15); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0, 255, 136, 0.3); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .qr-container { background: #fff; padding: 16px; border-radius: 14px; margin: 15px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .tx-details-box { width: 100%; max-width: 320px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 12px; line-height: 1.6; }
        
        .bottom-nav { display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--border); background: var(--bg-panel); margin-top: auto; }
        .nav-item { color: var(--text-muted); background: none; border: none; font-size: 18px; cursor: pointer; transition: var(--transition); padding: 8px; }
        .nav-item.active { color: var(--primary); }
        
        .screen { display: none; flex: 1; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        
        .history-section { padding: 20px; }
        .history-card { background: var(--bg-base); border: 1px solid var(--border); padding: 14px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .badge { background: rgba(0,255,136,0.1); color: var(--primary); padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px; }

        .copyright { text-align: center; font-size: 10px; color: var(--text-muted); padding: 15px 10px; background: var(--bg-panel); border-top: 1px solid var(--border); letter-spacing: 0.5px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="splash-screen">
        <h1 class="brand">COIN<span>PAY</span></h1>
        <div class="spinner" style="margin-top: 25px;"></div>
        <p style="margin-top: 20px; font-size: 11px; color: var(--text-muted); letter-spacing: 1px;">A INICIAR SISTEMA...</p>
    </div>

    <header class="header">
        <div class="brand-container">
            <img src="logo.png" alt="Logo" class="brand-logo" onerror="this.outerHTML='<i class=\'fa-solid fa-cube\' style=\'color: var(--primary); font-size: 24px;\'></i>'">
            <div class="brand">COIN<span>PAY</span><br><span class="badge" style="margin-top: 2px; display: inline-block;">PRO VERSION</span></div>
        </div>
        <div>
            <button onclick="UI.toggleTheme()" style="background:none; border:none; color:var(--text-main); font-size:16px; margin-right:15px; cursor:pointer;"><i class="fas fa-moon"></i></button>
            <button onclick="window.AbrirModalWeb3 ? window.AbrirModalWeb3() : Web3.legacyConnect()" style="background:none; border:none; color:var(--primary); font-size:18px; cursor:pointer;"><i class="fas fa-wallet"></i></button>
        </div>
    </header>

    <div id="screen-pdv" class="screen active">
        <div class="visor">
            <div id="display-brl" class="amount">R$ 0,00</div>
            <div id="display-stats" class="amount-usd">≈ $ 0.00 USD | 0.0000 BNB</div>
        </div>

        <div class="keypad">
            <button class="key" onclick="POS.press('1')">1</button>
            <button class="key" onclick="POS.press('2')">2</button>
            <button class="key" onclick="POS.press('3')">3</button>
            <button class="key" onclick="POS.press('4')">4</button>
            <button class="key" onclick="POS.press('5')">5</button>
            <button class="key" onclick="POS.press('6')">6</button>
            <button class="key" onclick="POS.press('7')">7</button>
            <button class="key" onclick="POS.press('8')">8</button>
            <button class="key" onclick="POS.press('9')">9</button>
            <button class="key action" onclick="POS.press('C')">C</button>
            <button class="key" onclick="POS.press('0')">0</button>
            <button class="key action" onclick="POS.press('DEL')"><i class="fas fa-backspace"></i></button>
        </div>

        <button class="btn-main" onclick="POS.checkout()">GERAR COBRANÇA QR CODE <i class="fas fa-qrcode"></i></button>
    </div>

    <div id="screen-dash" class="screen">
        <div class="history-section">
            <h3 style="margin-bottom: 15px; font-weight: 600;">Painel de Vendas Locais</h3>
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button onclick="Storage.exportCSV()" style="flex:1; padding:11px; background:transparent; border:1px solid var(--primary); color:var(--primary); border-radius:8px; font-weight:bold; cursor:pointer; font-size:12px;"><i class="fas fa-file-csv"></i> EXPORTAR CSV</button>
                <button onclick="Storage.clear()" style="padding:11px; background:transparent; border:1px solid var(--danger); color:var(--danger); border-radius:8px; cursor:pointer;"><i class="fas fa-trash"></i></button>
            </div>
            <div id="history-container"></div>
        </div>
    </div>

    <div id="modal-checkout" class="modal">
        <h3 style="color:var(--primary); letter-spacing: 0.5px; margin-bottom: 5px;">PAGAMENTO EM AGUARDO</h3>
        <div class="qr-container" id="qrcode-box"></div>
        
        <div class="tx-details-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><strong>Cotação:</strong> <span id="md-details-rate">1 BNB ≈ R$ 3.000,00</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><strong>Destino:</strong> <span id="md-details-wallet">0x00...0000</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><strong>Data/Hora:</strong> <span id="md-details-date">-</span></div>
            <div style="display:flex; justify-content:space-between; margin-top:6px; padding-top:6px; border-top:1px solid var(--border); font-size:14px; color:var(--primary);"><strong>Total:</strong> <span id="md-details-crypto">0.0000 BNB</span></div>
        </div>

        <div style="display:flex; gap:12px; width: 100%; max-width: 320px;">
            <button class="btn-main" style="flex:1; margin:0; background:transparent; border:1px solid var(--primary); color:var(--primary);" onclick="POS.copyWallet()"><i class="fas fa-copy"></i> COPIAR</button>
            <button class="btn-main" style="flex:1; margin:0; background:var(--danger); color:white;" onclick="UI.closeModal()"><i class="fas fa-times"></i> CANCELAR</button>
        </div>
    </div>

    <div class="copyright">
        &copy; 2026 COINPAY. TODOS OS DIREITOS RESERVADOS.
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="UI.switchScreen('pdv')"><i class="fas fa-calculator"></i></button>
        <button class="nav-item" onclick="UI.switchScreen('dash')"><i class="fas fa-chart-bar"></i></button>
        <button class="nav-item" onclick="alert('Configurações Avançadas e Módulos do PWA em breve!')"><i class="fas fa-cog"></i></button>
    </nav>
</div>

<script type="module">
    import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers6@4.1.2';
    
    // Substitua pelo seu Project ID do cloud.walletconnect.com
    const projectId = 'INSIRA_SEU_PROJECT_ID_AQUI'; 

    const bscMainnet = {
        chainId: 56,
        name: 'BNB Smart Chain',
        currency: 'BNB',
        explorerUrl: 'https://bscscan.com',
        rpcUrl: 'https://bsc-dataseed.binance.org/'
    };

    const metadata = {
        name: 'Coinpay POS',
        description: 'Terminal de Vendas Web3',
        url: window.location.origin,
        icons: ['https://cryptologos.cc/logos/bnb-bnb-logo.png']
    };

    const ethersConfig = defaultConfig({
        metadata,
        enableEIP6963: true,
        enableInjected: true,
        enableCoinbase: true
    });

    if (projectId !== 'INSIRA_SEU_PROJECT_ID_AQUI') {
        const modal = createWeb3Modal({
            ethersConfig,
            chains: [bscMainnet],
            projectId,
            themeMode: 'dark',
            themeVariables: {
                '--w3m-accent': '#00ff88',
                '--w3m-color-mix': '#0b0e14',
                '--w3m-color-mix-strength': 40
            }
        });

        modal.subscribeProvider(state => {
            if (state.address) {
                localStorage.setItem("coinpay_wallet", state.address);
                window.Web3.wallet = state.address;
                console.log(`[CoinPay Engine][Web3] Ligado via Web3Modal: ${state.address}`);
            }
        });

        window.AbrirModalWeb3 = () => modal.open();
    }
</script>

<script>
    const DiagnosticEngine = {
        log: (module, msg, data = null) => {
            console.log(`%c[CoinPay Engine][${module}] ${msg}`, "color: #00ff88; font-weight: bold;", data || '');
        },
        error: (module, msg, err) => {
            console.error(`%c[CRITICAL ERROR][${module}] ${msg}`, "color: #ff3b30; font-weight: bold;", err);
            alert(`Falha Crítica [${module}]: ${msg}`);
        }
    };

    const Web3 = {
        wallet: localStorage.getItem("coinpay_wallet") || "0x0000000000000000000000000000000000000000",
        bnbPriceBRL: 3000.00, 
        bnbPriceUSD: 600.00,
        
        legacyConnect: async () => {
            if (!window.ethereum) return alert("Instale uma extensão Web3 ou configure o WalletConnect ID.");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                Web3.wallet = accounts[0];
                localStorage.setItem("coinpay_wallet", Web3.wallet);
                alert("Conectado à carteira local: " + Web3.wallet.substring(0,8) + "...");
                DiagnosticEngine.log('Web3', 'Conexão Injected Concluída', Web3.wallet);
            } catch (e) { DiagnosticEngine.error('Web3', 'Erro ao injetar provedor', e); }
        }
    };

    const Storage = {
        saveTx: (amountBRL, amountBNB) => {
            try {
                let currentHistory = JSON.parse(localStorage.getItem("coinpay_history") || "[]");
                currentHistory.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleString('pt-BR'),
                    brl: amountBRL,
                    bnb: amountBNB,
                    status: "Pendente/Gerado"
                });
                localStorage.setItem("coinpay_history", JSON.stringify(currentHistory));
                UI.renderHistory();
                DiagnosticEngine.log('Storage', 'Registo de venda armazenado localmente.');
            } catch (e) { DiagnosticEngine.error('Storage', 'Erro de persistência local', e); }
        },
        exportCSV: () => {
            let currentHistory = JSON.parse(localStorage.getItem("coinpay_history") || "[]");
            if(!currentHistory.length) return alert("Não existem dados de vendas para exportar.");
            
            let csvContent = "ID,Data_Hora,Valor_BRL,Valor_BNB,Status\n" + 
                currentHistory.map(t => `${t.id},${t.date},${t.brl},${t.bnb},${t.status}`).join("\n");
            
            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let url = URL.createObjectURL(blob);
            let link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `CoinPay_Vendas_${Date.now()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        },
        clear: () => {
            if(confirm("Deseja expurgar permanentemente todos os registos do terminal local?")) {
                localStorage.removeItem("coinpay_history");
                UI.renderHistory();
                DiagnosticEngine.log('Storage', 'Historial limpo pelo operador.');
            }
        }
    };

    const POS = {
        input: "",
        
        soundFeedback: () => {
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime);
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.04);
            } catch(e) { /* Bloqueio nativo ignorado */ }
        },

        press: (char) => {
            POS.soundFeedback();
            if(char === 'C') POS.input = "";
            else if(char === 'DEL') POS.input = POS.input.slice(0, -1);
            else if(POS.input.length < 9) POS.input += char;
            UI.updateVisor();
        },

        checkout: () => {
            let valBRL = parseFloat(POS.input) / 100;
            if (!valBRL || valBRL <= 0) return alert("Por favor, digite um montante válido para cobrança.");
            
            let valBNB = (valBRL / Web3.bnbPriceBRL).toFixed(6);
            
            let payload = `ethereum:${Web3.wallet}?value=${ethers.parseEther(valBNB.toString())}`;
            
            document.getElementById("qrcode-box").innerHTML = "";
            new QRCode(document.getElementById("qrcode-box"), { 
                text: payload, 
                width: 210, 
                height: 210,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });
            
            document.getElementById("md-details-crypto").innerText = `${valBNB} BNB`;
            document.getElementById("md-details-wallet").innerText = `${Web3.wallet.substring(0,8)}...${Web3.wallet.slice(-6)}`;
            document.getElementById("md-details-date").innerText = new Date().toLocaleString('pt-BR');
            document.getElementById("md-details-rate").innerText = `1 BNB ≈ R$ ${Web3.bnbPriceBRL.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            
            document.getElementById("modal-checkout").style.display = "flex";
            
            Storage.saveTx(valBRL.toFixed(2), valBNB);
            POS.input = "";
            UI.updateVisor();
            DiagnosticEngine.log('POS', 'Checkout Gerado com Sucesso', { brl: valBRL, bnb: valBNB });
        },

        copyWallet: () => {
            navigator.clipboard.writeText(Web3.wallet);
            alert("Endereço de destino copiado para a área de transferência!");
        }
    };

    const UI = {
        init: () => {
            setTimeout(() => { 
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1200);
            
            if(localStorage.getItem('coinpay_theme') === 'light') document.body.setAttribute('data-theme', 'light');
            UI.renderHistory();
            DiagnosticEngine.log('UI', 'Ambiente Gráfico Inicia    };
</script>
</body>
</html>
