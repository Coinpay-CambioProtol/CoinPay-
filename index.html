<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COINPAY TERMINAL | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #02040a; --neon: #00ff88; --panel: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: monospace; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; }
        .btn-pay { background: var(--neon); color: #000; font-weight: bold; width: 100%; padding: 20px; border-radius: 8px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-md mx-auto flex justify-between items-center mb-6">
        <h1 class="text-lg font-bold">COINPAY <span style="color:var(--neon)">TERMINAL</span></h1>
        <button id="btn-connect" onclick="App.connect()" class="text-[10px] border border-green-500 px-3 py-1 rounded">CONECTAR</button>
    </header>

    <main class="max-w-md mx-auto glass p-6">
        <div id="visor" class="text-right text-4xl mb-6 text-green-400">R$ 0,00</div>
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="App.numpad(1)">1</button><button onclick="App.numpad(2)">2</button><button onclick="App.numpad(3)">3</button>
            <button onclick="App.numpad(4)">4</button><button onclick="App.numpad(5)">5</button><button onclick="App.numpad(6)">6</button>
            <button onclick="App.numpad(7)">7</button><button onclick="App.numpad(8)">8</button><button onclick="App.numpad(9)">9</button>
            <button onclick="App.clear()">C</button><button onclick="App.numpad(0)">0</button><button onclick="App.backspace()">⌫</button>
        </div>
        <button class="btn-pay" onclick="App.process()">PROCESSAR PAGAMENTO</button>
    </main>

    <div id="config" class="max-w-md mx-auto mt-6 text-[10px]">
        <input type="text" id="wallet-lojista" placeholder="Endereço do Lojista" class="w-full bg-black p-2 border border-gray-700">
        <button onclick="App.save()" class="mt-2 text-green-500">SALVAR CARTEIRA</button>
    </div>

    <script>
        const App = {
            valor: 0,
            address: localStorage.getItem('cfg_wallet') || "",

            // Conexão unificada (MetaMask e TrustWallet)
            connect: async () => {
                if (!window.ethereum) return alert("Use o navegador da sua carteira (MetaMask/Trust).");
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    App.address = accounts[0];
                    document.getElementById('btn-connect').innerText = App.address.slice(0,6) + "...";
                } catch(e) { alert("Erro de conexão."); }
            },

            numpad: (n) => { App.valor = (App.valor * 10) + n; App.update(); },
            clear: () => { App.valor = 0; App.update(); },
            backspace: () => { App.valor = Math.floor(App.valor / 10); App.update(); },
            update: () => { document.getElementById('visor').innerText = "R$ " + (App.valor/100).toFixed(2).replace('.', ','); },

            process: async () => {
                if(!App.address) await App.connect();
                // Aqui chamamos o seu contrato:
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                alert("Redirecionando para assinatura na carteira...");
            },

            save: () => {
                const addr = document.getElementById('wallet-lojista').value;
                localStorage.setItem('cfg_wallet', addr);
                alert("Carteira salva!");
            }
        };

        // Conexão Automática ao carregar
        window.onload = async () => {
            document.getElementById('wallet-lojista').value = App.address;
            if (window.ethereum) {
                // Tenta conectar silenciosamente se já houver permissão
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) App.connect();
            }
        };
    </script>
</body>
</html>
