<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COINPAY | TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-base: #010208; --bg-panel: #0b0e14; --primary: #00ff88; --danger: #ff3b30; --text-main: #ffffff; --text-muted: #888888; --border: #1f293d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 440px; background: var(--bg-panel); border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-wallet { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .visor { background: var(--bg-base); margin: 20px; padding: 30px; border-radius: 14px; text-align: right; }
        .amount { font-size: 40px; font-weight: bold; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .key { background: var(--bg-base); border: 1px solid var(--border); color: white; padding: 20px; border-radius: 10px; cursor: pointer; font-size: 20px; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 20px; margin: 20px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div style="font-weight:900; font-size:18px;">COIN<span style="color:var(--primary)">PAY</span></div>
        <button id="btn-connect" class="btn-wallet" onclick="ConnectionManager.init()">CONECTAR</button>
    </header>

    <div id="screen-pdv">
        <div class="visor">
            <div id="display-brl" class="amount">R$ 0,00</div>
        </div>
        <div class="keypad">
            <button class="key" onclick="POS.press('1')">1</button>
            <button class="key" onclick="POS.press('2')">2</button>
            <button class="key" onclick="POS.press('3')">3</button>
            <button class="key" onclick="POS.press('4')">4</button>
            <button class="key" onclick="POS.press('5')">5</button>
            <button class="key" onclick="POS.press('6')">6</button>
            <button class="key" onclick="POS.press('7')">7</button>
            <button class="key" onclick="POS.press('8')">8</button>
            <button class="key" onclick="POS.press('9')">9</button>
            <button class="key" onclick="POS.press('C')">C</button>
            <button class="key" onclick="POS.press('0')">0</button>
            <button class="key" onclick="POS.press('DEL')"><i class="fas fa-backspace"></i></button>
        </div>
        <button class="btn-main" onclick="POS.checkout()" style="width: calc(100% - 40px);">GERAR QR CODE</button>
    </div>

    <div id="modal-checkout" class="modal">
        <div id="qrcode-box" style="background:white; padding:10px;"></div>
        <button class="btn-main" onclick="document.getElementById('modal-checkout').style.display='none'">FECHAR</button>
    </div>
</div>

<script type="module">
    import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers6@4.1.2';
    
    // IMPORTANTE: Insira seu Project ID aqui
    const projectId = 'INSIRA_SEU_PROJECT_ID_AQUI'; 

    const modal = createWeb3Modal({
        ethersConfig: defaultConfig({ metadata: { name: 'Coinpay', description: 'POS', url: window.location.origin, icons: [] } }),
        chains: [{ chainId: 56, name: 'BNB', currency: 'BNB', explorerUrl: 'https://bscscan.com', rpcUrl: 'https://bsc-dataseed.binance.org/' }],
        projectId,
        themeMode: 'dark'
    });

    window.AbrirModalWeb3 = () => modal.open();
</script>

<script>
    const ConnectionManager = {
        init: async () => {
            if (window.AbrirModalWeb3) {
                window.AbrirModalWeb3();
            } else {
                // Fallback para conexão manual básica se o módulo falhar
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    alert("Conectado: " + accounts[0]);
                } catch (e) {
                    alert("Carteira não encontrada. Certifique-se de estar usando um navegador Web3 (MetaMask/Trust Browser).");
                }
            }
        }
    };

    const POS = {
        input: "",
        press: (c) => {
            if(c === 'C') POS.input = "";
            else if(c === 'DEL') POS.input = POS.input.slice(0,-1);
            else if(POS.input.length < 8) POS.input += c;
            document.getElementById('display-brl').innerText = (parseFloat(POS.input)/100 || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        },
        checkout: () => {
            const val = parseFloat(POS.input)/100;
            if(val <= 0) return alert("Valor inválido");
            document.getElementById('modal-checkout').style.display = 'flex';
            document.getElementById('qrcode-box').innerHTML = "";
            new QRCode(document.getElementById('qrcode-box'), "https://bscscan.com/address/0x..."); // Substitua pelo seu endereço
        }
    };
</script>
</body>
</html>
