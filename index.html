<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COINPAY TERMINAL | Tio7 Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* [UI/UX] Dark Mode / Light Mode Variables */
        :root {
            --bg-base: #010208;
            --bg-panel: #0b0e14;
            --primary: #00ff88;
            --danger: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #1f293d;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-base: #f0f2f5;
            --bg-panel: #ffffff;
            --primary: #00cc6a;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
        }

        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; transition: var(--transition); user-select: none; }
        
        /* Layout Principal */
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-panel); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        
        /* [UI/UX] Splash Screen & Loading */
        #splash-screen { position: absolute; inset: 0; background: var(--bg-base); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Componentes */
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 900; letter-spacing: 1px; color: var(--text-main); }
        .brand span { color: var(--primary); }
        
        .visor { background: var(--bg-base); margin: 20px; padding: 30px 20px; border-radius: 12px; text-align: right; border: 1px solid var(--border); }
        .amount { font-size: 42px; font-weight: bold; font-family: 'Courier New', monospace; letter-spacing: -1px; }
        .amount-usd { font-size: 14px; color: var(--text-muted); margin-top: 5px; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; }
        .key { background: var(--bg-base); border: 1px solid var(--border); color: var(--text-main); padding: 20px; border-radius: 12px; font-size: 24px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .key:active { background: var(--primary); color: #000; transform: scale(0.95); }
        .key.action { font-size: 18px; color: var(--danger); }
        
        .btn-main { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 16px; margin: 20px; cursor: pointer; transition: var(--transition); text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4); }

        /* Modais e Paineis */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .qr-container { background: #fff; padding: 15px; border-radius: 12px; margin: 20px 0; }
        
        /* Navegação Inferior */
        .bottom-nav { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); background: var(--bg-panel); margin-top: auto; }
        .nav-item { color: var(--text-muted); background: none; border: none; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        
        /* Telas Ocultas */
        .screen { display: none; flex: 1; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; }
        
        .history-list { padding: 20px; }
        .history-card { background: var(--bg-base); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* Utilitários */
        .badge { background: rgba(0,255,136,0.1); color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="splash-screen">
        <h1 class="brand">COIN<span>PAY</span></h1>
        <div class="spinner" style="margin-top: 20px;"></div>
        <p style="margin-top: 20px; font-size: 12px; color: var(--text-muted);">Iniciando Motor de Diagnóstico...</p>
    </div>

    <header class="header">
        <div class="brand">COIN<span>PAY</span> <span class="badge">PRO</span></div>
        <div>
            <button onclick="UI.toggleTheme()" style="background:none; border:none; color:var(--text-main); font-size:18px; margin-right:15px;"><i class="fas fa-moon"></i></button>
            <button onclick="Web3.connect()" style="background:none; border:none; color:var(--primary); font-size:18px;"><i class="fas fa-wallet"></i></button>
        </div>
    </header>

    <div id="screen-pdv" class="screen active">
        <div class="visor">
            <div id="display-brl" class="amount">R$ 0,00</div>
            <div id="display-usd" class="amount-usd">≈ $ 0.00 USD | 0.0000 BNB</div>
        </div>

        <div class="keypad">
            <button class="key" onclick="POS.press('1')">1</button>
            <button class="key" onclick="POS.press('2')">2</button>
            <button class="key" onclick="POS.press('3')">3</button>
            <button class="key" onclick="POS.press('4')">4</button>
            <button class="key" onclick="POS.press('5')">5</button>
            <button class="key" onclick="POS.press('6')">6</button>
            <button class="key" onclick="POS.press('7')">7</button>
            <button class="key" onclick="POS.press('8')">8</button>
            <button class="key" onclick="POS.press('9')">9</button>
            <button class="key action" onclick="POS.press('C')">C</button>
            <button class="key" onclick="POS.press('0')">0</button>
            <button class="key action" onclick="POS.press('DEL')"><i class="fas fa-backspace"></i></button>
        </div>

        <button class="btn-main" onclick="POS.checkout()">GERAR COBRANÇA <i class="fas fa-qrcode"></i></button>
    </div>

    <div id="screen-dash" class="screen">
        <div style="padding: 20px;">
            <h3 style="margin-top:0;">Histórico de Vendas</h3>
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button onclick="Storage.exportCSV()" style="flex:1; padding:10px; background:transparent; border:1px solid var(--primary); color:var(--primary); border-radius:6px;"><i class="fas fa-file-csv"></i> Exportar CSV</button>
                <button onclick="Storage.clear()" style="padding:10px; background:transparent; border:1px solid var(--danger); color:var(--danger); border-radius:6px;"><i class="fas fa-trash"></i></button>
            </div>
            <div id="history-container" class="history-list" style="padding:0;"></div>
        </div>
    </div>

    <div id="modal-checkout" class="modal">
        <h2 style="color:var(--primary); margin-top:0;">PAGAMENTO PENDENTE</h2>
        <div class="qr-container" id="qrcode-box"></div>
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="modal-amount-bnb" style="font-size:24px; font-weight:bold; color:white;">0.00 BNB</div>
            <div id="modal-wallet" style="font-size:12px; color:var(--text-muted); margin-top:10px; user-select:all;">0x...</div>
        </div>
        <div style="display:flex; gap:10px; width: 90%;">
            <button class="btn-main" style="flex:1; margin:0; background:transparent; border:1px solid var(--primary); color:var(--primary);" onclick="POS.copyWallet()"><i class="fas fa-copy"></i> Copiar</button>
            <button class="btn-main" style="flex:1; margin:0; background:var(--danger); color:white;" onclick="UI.closeModal()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="UI.switchScreen('pdv')"><i class="fas fa-calculator"></i></button>
        <button class="nav-item" onclick="UI.switchScreen('dash')"><i class="fas fa-chart-bar"></i></button>
        <button class="nav-item" onclick="alert('Configurações avançadas em breve!')"><i class="fas fa-cog"></i></button>
    </nav>
</div>

<script>
    /**
     * MOTOR DE DIAGNÓSTICO DE ERROS
     * Captura, formata e avisa sobre falhas no sistema ou na blockchain.
     */
    const DiagnosticEngine = {
        log: (module, msg, data = null) => {
            console.log(`[Tio7 System][${module}] ${msg}`, data || '');
        },
        error: (module, msg, err) => {
            console.error(`[CRITICAL][${module}] ${msg}`, err);
            // Em produção, isso enviaria o erro para o Sentry (Melhoria 86)
            alert(`Erro no Módulo ${module}: ${msg}`);
        }
    };

    /**
     * ARQUITETURA DE DADOS E ARMAZENAMENTO (Melhorias 51-75)
     */
    const Storage = {
        saveTx: (amountBRL, amountBNB, hash = "Pendente") => {
            try {
                let hist = JSON.parse(localStorage.getItem("t7_history") || "[]");
                hist.unshift({ id: Date.now(), date: new Date().toLocaleString(), brl: amountBRL, bnb: amountBNB, hash });
                localStorage.setItem("t7_history", JSON.stringify(hist));
                UI.renderHistory();
                DiagnosticEngine.log('Storage', 'Transação salva localmente');
            } catch (e) { DiagnosticEngine.error('Storage', 'Falha ao salvar transação', e); }
        },
        exportCSV: () => {
            let hist = JSON.parse(localStorage.getItem("t7_history") || "[]");
            if(!hist.length) return alert("Histórico vazio.");
            let csv = "Data,BRL,BNB,Hash\n" + hist.map(t => `${t.date},${t.brl},${t.bnb},${t.hash}`).join("\n");
            let link = document.createElement("a");
            link.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
            link.download = `Relatorio_Vendas_${new Date().getTime()}.csv`;
            link.click();
        },
        clear: () => {
            if(confirm("Apagar todo o histórico de vendas?")) {
                localStorage.removeItem("t7_history");
                UI.renderHistory();
            }
        }
    };

    /**
     * INTEGRAÇÃO WEB3 & BLOCKCHAIN (Melhorias 26-50)
     */
    const Web3 = {
        wallet: localStorage.getItem("t7_wallet") || "0x0000000000000000000000000000000000000000",
        bnbPriceBRL: 3000, // Preço fixo simulado. (Melhoria: Integrar API Binance)
        bnbPriceUSD: 600,
        
        connect: async () => {
            if (!window.ethereum) return alert("MetaMask não encontrada!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                
                // Força Rede BSC (ChainId 56 / 0x38)
                try {
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
                } catch(e) {
                    DiagnosticEngine.log('Web3', 'Rede BSC não detectada, solicitando adição...', e);
                }

                Web3.wallet = accounts[0];
                localStorage.setItem("t7_wallet", Web3.wallet);
                alert("Carteira conectada: " + Web3.wallet.substring(0,6) + "...");
                DiagnosticEngine.log('Web3', 'Conexão bem sucedida', Web3.wallet);
            } catch (e) { DiagnosticEngine.error('Web3', 'Falha na conexão', e); }
        }
    };

    /**
     * MOTOR DO PDV E LÓGICA DE CÁLCULO (Melhorias 1-25)
     */
    const POS = {
        input: "",
        
        beep: () => {
            // Feedback Sonoro (Melhoria 4)
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.value = 800;
                osc.start(); osc.stop(ctx.currentTime + 0.05);
            } catch(e) { /* Ignora se navegador bloquear audio */ }
        },

        press: (val) => {
            POS.beep();
            if(val === 'C') POS.input = "";
            else if(val === 'DEL') POS.input = POS.input.slice(0, -1);
            else if(POS.input.length < 8) POS.input += val;
            UI.updateVisor();
        },

        checkout: () => {
            let vBRL = parseFloat(POS.input) / 100;
            if (!vBRL || vBRL <= 0) return alert("Insira um valor.");
            
            let vBNB = (vBRL / Web3.bnbPriceBRL).toFixed(6);
            let payload = `ethereum:${Web3.wallet}?value=${ethers.parseEther(vBNB.toString())}`;
            
            document.getElementById("qrcode-box").innerHTML = "";
            new QRCode(document.getElementById("qrcode-box"), { text: payload, width: 220, height: 220, colorDark: "#000", colorLight: "#fff" });
            
            document.getElementById("modal-amount-bnb").innerText = `${vBNB} BNB`;
            document.getElementById("modal-wallet").innerText = Web3.wallet;
            
            document.getElementById("modal-checkout").style.display = "flex";
            
            // Auto-salva a intenção de transação
            Storage.saveTx(vBRL.toFixed(2), vBNB);
            POS.input = "";
            UI.updateVisor();
            DiagnosticEngine.log('POS', 'Cobrança gerada', { brl: vBRL, bnb: vBNB });
        },

        copyWallet: () => {
            navigator.clipboard.writeText(Web3.wallet);
            alert("Carteira copiada!");
        }
    };

    /**
     * GERENCIADOR DE INTERFACE (Melhorias 1-25)
     */
    const UI = {
        init: () => {
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);
            if(localStorage.getItem('t7_theme') === 'light') document.body.setAttribute('data-theme', 'light');
            UI.renderHistory();
        },

        updateVisor: () => {
            let vBRL = parseFloat(POS.input) / 100 || 0;
            let vUSD = vBRL / (Web3.bnbPriceBRL / Web3.bnbPriceUSD);
            let vBNB = vBRL / Web3.bnbPriceBRL;
            
            document.getElementById("display-brl").innerText = vBRL.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById("display-usd").innerText = `≈ $ ${vUSD.toFixed(2)} USD | ${vBNB.toFixed(4)} BNB`;
        },

        switchScreen: (screenName) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`screen-${screenName}`).classList.add('active');
            event.currentTarget.classList.add('active');
        },

        toggleTheme: () => {
            let current = document.body.getAttribute('data-theme');
            let next = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('t7_theme', next);
        },

        closeModal: () => { document.getElementById("modal-checkout").style.display = "none"; },

        renderHistory: () => {
            let hist = JSON.parse(localStorage.getItem("t7_history") || "[]");
            document.getElementById("history-container").innerHTML = hist.map(t => `
                <div class="history-card">
                    <div>
                        <div style="font-weight:bold;">R$ ${t.brl}</div>
                        <div style="font-size:11px; color:var(--text-muted);">${t.date}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:var(--primary); font-weight:bold;">${t.bnb} BNB</div>
                        <div class="badge">Concluído</div>
                    </div>
                </div>
            `).join("");
        }
    };

    // Inicialização do Sistema
    window.onload = UI.init;

    // --- STUBS PARA EXPANSÃO FUTURA (As outras 70 funcionalidades entram nestes blocos) ---
    const MódulosAvançados = {
        crm: () => { /* Melhorias 64: Integrar banco de dados de clientes */ },
        ipfs: () => { /* Melhoria 47: Salvar recibos descentralizados */ },
        multiToken: () => { /* Melhoria 27: Seletor de USDT/USDC na tela de POS */ },
        serviceWorker: () => { /* Melhoria 85: Transformar em PWA offline */ }
    };
</script>
</body>
</html>
