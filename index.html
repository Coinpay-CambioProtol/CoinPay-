    <script>
        // Endereço do contrato inteligente (ex: Token USDT/USDC ou Gateway)
        const CONTRACT_ADDRESS = "0x79ce1969be43f738a6d05c89e2bd73d39b009b1c";
        const CONTRACT_ABI = [
            {
                "inputs": [
                    { "internalType": "address", "name": "recipient", "type": "address" },
                    { "internalType": "uint256", "name": "amount", "type": "uint256" }
                ],
                "name": "transfer",
                "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        let qrcodeInstance = null;

        const App = {
            valorCentavos: 0,
            walletLojista: "",
            
            init: () => {
                const urlParams = new URLSearchParams(window.location.search);
                const val = urlParams.get('v');
                const m = urlParams.get('m');
                const dest = urlParams.get('dest');

                // MODO PAGADOR: Se a URL contiver parâmetros de cobrança
                if (dest && val && m) {
                    App.walletLojista = dest;
                    document.getElementById('payer-val').innerText = `${m} ${parseFloat(val).toFixed(2)}`;
                    document.getElementById('payer-dest').innerText = `Para: ${dest}`;
                    document.getElementById('payer-container').classList.remove('hidden');
                    
                    setTimeout(() => { App.executarPagamentoCliente(val); }, 1500);
                    return;
                }

                // MODO TERMINAL: Carrega configurações do lojista
                App.walletLojista = localStorage.getItem('coinpay_wallet') || "";
                if (!App.walletLojista) {
                    App.abrirConfiguracao();
                } else {
                    App.voltarAoTerminal();
                }
            },

            abrirConfiguracao: () => {
                App.esconderTelas();
                document.getElementById('input-wallet').value = App.walletLojista;
                document.getElementById('config-container').classList.remove('hidden');
            },

            salvarCarteiraLojista: () => {
                const wallet = document.getElementById('input-wallet').value.trim();
                if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) {
                    alert("Por favor, insira um endereço EVM válido (0x...).");
                    return;
                }
                localStorage.setItem('coinpay_wallet', wallet);
                App.walletLojista = wallet;
                App.voltarAoTerminal();
            },

            voltarAoTerminal: () => {
                App.esconderTelas();
                App.clear();
                document.getElementById('terminal-container').classList.remove('hidden');
            },

            numpad: (num) => {
                if (App.valorCentavos >= 99999999) return; // Limite máximo
                App.valorCentavos = (App.valorCentavos * 10) + num;
                App.updateVisor();
            },

            clear: () => {
                App.valorCentavos = 0;
                App.updateVisor();
            },

            backspace: () => {
                App.valorCentavos = Math.floor(App.valorCentavos / 10);
                App.updateVisor();
            },

            updateVisor: () => {
                const moeda = document.getElementById('moeda').value;
                const valorFinal = (App.valorCentavos / 100).toFixed(2);
                document.getElementById('visor').innerText = `${moeda} ${valorFinal}`;
            },

            update: () => {
                App.updateVisor();
            },

            gerarLinkCobranca: () => {
                const moeda = document.getElementById('moeda').value;
                const valorFinal = (App.valorCentavos / 100).toFixed(2);
                const baseUrl = window.location.origin + window.location.pathname;
                return `${baseUrl}?v=${valorFinal}&m=${moeda}&dest=${App.walletLojista}`;
            },

            gerarCobranca: () => {
                if (App.valorCentavos <= 0) {
                    alert("Insira um valor maior que zero.");
                    return;
                }
                
                App.esconderTelas();
                const moeda = document.getElementById('moeda').value;
                const valorFinal = (App.valorCentavos / 100).toFixed(2);
                const link = App.gerarLinkCobranca();

                document.getElementById('cobranca-valores').innerText = `${moeda} ${valorFinal}`;
                document.getElementById('checkout-container').classList.remove('hidden');

                // Renderiza o QR Code
                const qrDiv = document.getElementById('qrcode');
                qrDiv.innerHTML = "";
                qrcodeInstance = new QRCode(qrDiv, {
                    text: link,
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            },

            copiarLink: () => {
                const link = App.gerarLinkCobranca();
                navigator.clipboard.writeText(link).then(() => {
                    alert("Link de pagamento copiado!");
                });
            },

            compartilhar: (plataforma) => {
                const link = encodeURIComponent(App.gerarLinkCobranca());
                const texto = encodeURIComponent("🧾 Solicitação de pagamento CoinPay Global:");
                let url = "";

                if (plataforma === 'whatsapp') url = `https://whatsapp.com{texto}%20${link}`;
                if (plataforma === 'telegram') url = `https://t.me{link}&text=${texto}`;
                
                window.open(url, '_blank');
            },

            executarPagamentoCliente: async (valorNorm) => {
                if (!window.ethereum) {
                    alert("MetaMask ou Web3 Wallet não detectada no navegador.");
                    return;
                }

                try {
                    // Inicializa provedor Ethers v6
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const signer = await provider.getSigner();
                    
                    // Decimais padrão (ajuste se usar contratos reais de redes específicas)
                    const quantidadeTokens = ethers.parseUnits(valorNorm, 18);

                    const contrato = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                    
                    // Dispara transação web3
                    const tx = await contrato.transfer(App.walletLojista, quantidadeTokens);
                    
                    document.getElementById('payer-container').classList.remove('animate-pulse');
                    document.getElementById('payer-container').innerHTML = `
                        <div class='text-green-400 text-4xl mb-2'>✓</div>
                        <div class='text-md font-bold mb-2'>PAGAMENTO ENVIADO</div>
                        <p class='text-xs text-gray-400'>Aguardando confirmação na Blockchain...</p>
                    `;
                    
                    await tx.wait();
                    alert("Transação confirmada com sucesso!");

                } catch (error) {
                    console.error(error);
                    alert("Erro ou rejeição no processamento do pagamento.");
                }
            },

            esconderTelas: () => {
                document.getElementById('config-container').classList.add('hidden');
                document.getElementById('terminal-container').classList.add('hidden');
                document.getElementById('checkout-container').classList.add('hidden');
                document.getElementById('payer-container').classList.add('hidden');
            }
        };

        // Inicializa o app ao carregar a página
        window.onload = () => { App.init(); };
    </script>
</body>
</html>
