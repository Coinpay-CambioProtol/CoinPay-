<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COINPAY | TERMINAL PDV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #010208; --bg-panel: #0b0e14; --primary: #00ff88; --danger: #ff3b30; --text-main: #FFFFFF; }
        body { margin: 0; background: var(--bg-main); color: var(--text-main); font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .terminal-container { width: 100%; max-width: 420px; height: 100vh; background: var(--bg-main); border: 1px solid #1f293d; display: flex; flex-direction: column; }
        .header-pdv { background: var(--bg-panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .visor-container { background: var(--bg-panel); margin: 20px; padding: 20px; border-radius: 8px; text-align: center; }
        .visor-amount { font-size: 36px; font-weight: bold; margin: 15px 0; font-family: 'Courier New', monospace; }
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
        .key { background: #111622; border: none; color: white; padding: 15px; border-radius: 6px; cursor: pointer; }
        .key:active { background: var(--primary); color: black; }
        .btn-action { width: 90%; margin: 10px auto; background: var(--primary); border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        .history-container { margin: 20px; padding: 15px; background: #0b0e14; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

<div class="terminal-container">
    <div id="screen-auth" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <h2>TERMINAL COINPAY</h2>
        <button class="btn-action" onclick="conectarCarteiraWeb3()">CONECTAR METAMASK/TRUST</button>
        <p>ou</p>
        <input type="text" id="wallet-input" placeholder="Carteira BSC (0x...)" style="padding:10px; width:80%; margin: 10px; background:#111; border:1px solid #333; color:white;">
        <button onclick="conectarManual()" style="background:none; border:none; color:var(--primary); cursor:pointer;">Entrada Manual</button>
    </div>

    <div id="screen-pdv" style="display: none; flex-direction: column; flex: 1;">
        <div class="header-pdv">
            <button onclick="location.href='index.html'" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-arrow-left"></i></button>
            <div id="display-wallet" style="font-size: 11px; color: var(--primary);">0x...</div>
        </div>

        <div class="visor-container">
            <div id="visor-real" class="visor-amount">R$ 0,00</div>
        </div>

        <div class="keyboard">
            <button class="key" onclick="pressKey('1')">1</button><button class="key" onclick="pressKey('2')">2</button><button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button><button class="key" onclick="pressKey('5')">5</button><button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button><button class="key" onclick="pressKey('8')">8</button><button class="key" onclick="pressKey('9')">9</button>
            <button class="key" onclick="pressKey('C')" style="color:var(--danger)">C</button><button class="key" onclick="pressKey('0')">0</button><button class="key" onclick="pressKey('⌫')">⌫</button>
        </div>

        <button class="btn-action" onclick="solicitarCheckout()">GERAR COBRANÇA</button>

        <div class="history-container">
            <strong>HISTÓRICO RECENTE</strong>
            <div id="lista-historico" style="margin-top: 10px;"></div>
            <button onclick="exportarParaCSV()" style="margin-top:10px; background:none; border:1px solid var(--primary); color:var(--primary); cursor:pointer; width:100%; padding:5px;">EXPORTAR CSV</button>
        </div>
    </div>
</div>

<script>
    let rawInput = "";
    let carteiraSalva = localStorage.getItem("coinpay_wallet");

    window.onload = () => { if(carteiraSalva) entrarNoPainel(); };

    // --- CONEXÃO WEB3 ---
    async function conectarCarteiraWeb3() {
        if (!window.ethereum) return alert("Instale uma carteira Web3!");
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
            carteiraSalva = accounts[0];
            localStorage.setItem("coinpay_wallet", carteiraSalva);
            entrarNoPainel();
        } catch (e) { alert("Erro na conexão Web3"); }
    }

    function conectarManual() {
        let w = document.getElementById("wallet-input").value.trim();
        if(w.startsWith("0x")) {
            localStorage.setItem("coinpay_wallet", w);
            carteiraSalva = w;
            entrarNoPainel();
        }
    }

    function entrarNoPainel() {
        document.getElementById("screen-auth").style.display = "none";
        document.getElementById("screen-pdv").style.display = "flex";
        document.getElementById("display-wallet").innerText = carteiraSalva.substring(0,6) + "...";
        renderizarHistorico();
    }

    // --- LÓGICA PDV ---
    function pressKey(val) {
        if(val === 'C') rawInput = "";
        else if(val === '⌫') rawInput = rawInput.slice(0, -1);
        else if(rawInput.length < 8) rawInput += val;
        let v = (parseFloat(rawInput)/100 || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        document.getElementById("visor-real").innerText = v;
    }

    function renderizarHistorico() {
        let hist = JSON.parse(localStorage.getItem("coinpay_history") || "[]");
        document.getElementById("lista-historico").innerHTML = hist.map(t => 
            `<div>${t.data} | ${t.valor} BNB</div>`).join("");
    }

    function exportarParaCSV() {
        let hist = JSON.parse(localStorage.getItem("coinpay_history") || "[]");
        let csv = "Data,Valor,Token\n" + hist.map(t => `${t.data},${t.valor},${t.token}`).join("\n");
        let link = document.createElement("a");
        link.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
        link.download = "Relatorio.csv";
        link.click();
    }

    function solicitarCheckout() { 
        alert("Cobrança gerada com sucesso!"); 
        let v = (rawInput/100).toFixed(2);
        let hist = JSON.parse(localStorage.getItem("coinpay_history") || "[]");
        hist.unshift({data: new Date().toLocaleTimeString(), valor: v, token: "BNB"});
        localStorage.setItem("coinpay_history", JSON.stringify(hist.slice(0, 10)));
        renderizarHistorico();
    }
</script>
</body>
</html>
